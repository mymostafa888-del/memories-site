<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social | Mostafa Edition</title>
    <style>
        :root {
            --primary: #ff4081;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg: #18191a;
            --card-bg: #242526;
            --text: #e4e6eb;
            --shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: 0.3s;
            overflow-x: hidden; /* حل مشكلة المنيو اللي ظاهرة */
        }

        /* تعديل المنيو */
        .menu-icon {
            position: fixed; top: 15px; right: 15px;
            font-size: 22px; cursor: pointer; z-index: 1001;
            background: var(--primary); color: white;
            width: 45px; height: 45px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: var(--shadow);
        }

        .sidebar {
            position: fixed; right: -300px; top: 0; /* مخفية تماماً بره الشاشة */
            width: 280px; height: 100%;
            background: var(--card-bg); z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; box-sizing: border-box;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar.show { right: 0; }

        .container { max-width: 500px; margin: 20px auto; padding: 10px; }

        .room-header {
            width: 100%; height: 120px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            display: flex; align-items: center; justify-content: center;
            color: white; border-radius: 0 0 20px 20px; margin-bottom: 20px;
        }

        /* ستايل البوست وحجم الصور */
        .post {
            background: var(--card-bg); border-radius: 12px;
            margin-bottom: 25px; box-shadow: var(--shadow); overflow: hidden;
        }

        .post-img-container {
            width: 100%;
            max-height: 450px; /* أقصى طول للصورة عشان متسحبش الشاشة */
            background: #eee;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .post-img {
            width: 100%;
            height: auto;
            object-fit: contain; /* بيحافظ على أبعاد الصورة مهما كان حجمها */
            cursor: pointer;
        }

        .post-actions {
            padding: 12px 15px; display: flex; 
            justify-content: space-between; /* عشان نبعد التحميل عن التفاعلات */
            align-items: center; border-top: 1px solid rgba(0,0,0,0.05);
        }

        .reactions-group { display: flex; gap: 15px; font-size: 22px; }

        /* ستايل زرار رفع الصور الجديد */
        .file-upload-btn {
            background: #f0f2f5; color: #555;
            padding: 10px; border-radius: 8px;
            border: 2px dashed #ccc; text-align: center;
            cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .file-upload-btn:hover { background: #e4e6eb; border-color: var(--primary); }

        /* الشات */
        .chat-container {
            background: var(--card-bg); height: 450px;
            display: flex; flex-direction: column; border-radius: 15px; box-shadow: var(--shadow);
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 14px; }
        .msg-me { align-self: flex-start; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-end; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }

        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal img { max-width: 95%; max-height: 90%; }
    </style>
</head>
<body>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">
    <h3 style="margin-top:40px">الإعدادات</h3>
    <button onclick="showPage('memPage')">📸 الذكريات</button>
    <button onclick="showPage('chatPage')">💬 الشات</button>
    <button onclick="showPage('infoPage')">📊 بيانات الروم</button>
    <hr>
    <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0;">
        <span>الوضع الليلي</span>
        <input type="checkbox" onchange="toggleDark()" style="width:30px">
    </div>
    <button onclick="copyLink()" style="background:#4267B2">🔗 نسخ رابط الروم</button>
    <button onclick="location.reload()" style="background:#555">خروج</button>
</div>

<div class="container" id="home">
    <h1 style="text-align:center">Memories Social</h1>
    <button onclick="showPage('create')">إنشاء غرفة ذكريات</button>
    <button onclick="showPage('join')">انضمام لغرفة</button>
</div>

<div class="container" id="create" style="display:none">
    <h3>إنشاء غرفة جديدة</h3>
    <input id="roomNameInput" placeholder="اسم الغرفة">
    <input id="userName1" placeholder="اسمك">
    <p>كود الغرفة: <b id="generatedCode" style="color:var(--primary)"></b></p>
    <button onclick="initRoom(true)">إنشاء</button>
</div>

<div class="container" id="join" style="display:none">
    <h3>انضمام لغرفة</h3>
    <input id="userName2" placeholder="اسمك">
    <input id="roomCodeInput" placeholder="كود الغرفة">
    <button onclick="initRoom(false)">دخول</button>
</div>

<div id="mainContent" style="display:none">
    <div class="room-header"><h2 id="displayRoomName"></h2></div>

    <div class="container" id="memPage">
        <div style="background:var(--card-bg); padding:15px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:20px">
            <input id="memText" placeholder="بماذا تشعر اليوم؟">
            
            <label for="memFile" class="file-upload-btn" id="fileLabel">📸 إضافة صورة للذكرى</label>
            <input type="file" id="memFile" accept="image/*" style="display:none" onchange="updateLabel()">
            
            <button onclick="uploadMemory()">نشر الذكرى</button>
        </div>
        <div id="postsList"></div>
    </div>

    <div class="container" id="chatPage" style="display:none">
        <div class="chat-container">
            <div class="chat-messages" id="chatMsgs"></div>
            <div style="padding:10px; display:flex; gap:5px; background:var(--card-bg)">
                <input id="chatInput" placeholder="اكتب رسالة...">
                <button onclick="sendMsg()" style="width:70px">إرسال</button>
            </div>
        </div>
    </div>

    <div class="container" id="infoPage" style="display:none">
        <div style="background:var(--card-bg); padding:20px; border-radius:12px; box-shadow:var(--shadow)">
            <h3>📊 بيانات الروم</h3>
            <p>🏷️ الكود: <b id="finalCode"></b></p>
            <p>👤 اسمك: <b id="finalUser"></b></p>
        </div>
    </div>
</div>

<div class="modal" id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script>
    let user = "", room = "", code = "", posts = [], messages = [];

    function toggleMenu() { document.getElementById("menu").classList.toggle("show"); }
    function toggleDark() { document.body.classList.toggle("dark-mode"); }
    
    function updateLabel() {
        const file = document.getElementById("memFile").files[0];
        if(file) document.getElementById("fileLabel").innerText = "✅ تم اختيار: " + file.name;
    }

    function showPage(p) {
        document.querySelectorAll('.container').forEach(div => div.style.display = 'none');
        document.getElementById(p).style.display = 'block';
        if(p === 'create') {
            code = Math.random().toString(36).substring(2,7).toUpperCase();
            document.getElementById("generatedCode").innerText = code;
        }
        document.getElementById("menu").classList.remove("show");
    }

    function initRoom(isCreate) {
        user = isCreate ? document.getElementById("userName1").value : document.getElementById("userName2").value;
        room = isCreate ? document.getElementById("roomNameInput").value : "غرفة مشتركة";
        code = isCreate ? code : document.getElementById("roomCodeInput").value;

        if(!user || !room) return alert("اكتب بياناتك كاملة");
        
        document.getElementById("home").style.display = "none";
        document.getElementById("create").style.display = "none";
        document.getElementById("join").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        
        document.getElementById("displayRoomName").innerText = room;
        document.getElementById("finalCode").innerText = code;
        document.getElementById("finalUser").innerText = user;
        showPage('memPage');
    }

    function uploadMemory() {
        let text = document.getElementById("memText").value;
        let file = document.getElementById("memFile").files[0];
        if(!text && !file) return;

        let id = Date.now();
        if(file) {
            let r = new FileReader();
            r.onload = (e) => { posts.push({id, user, text, img: e.target.result, likes: 0}); renderPosts(); };
            r.readAsDataURL(file);
        } else {
            posts.push({id, user, text, img: null, likes: 0});
            renderPosts();
        }
        document.getElementById("memText").value = ""; 
        document.getElementById("memFile").value = "";
        document.getElementById("fileLabel").innerText = "📸 إضافة صورة للذكرى";
    }

    function renderPosts() {
        let list = document.getElementById("postsList");
        list.innerHTML = posts.map(p => `
            <div class="post">
                <div class="post-header">
                    <span><b>${p.user}</b></span>
                    ${p.user === user ? `<span style="color:red; cursor:pointer" onclick="delPost(${p.id})">حذف</span>` : ''}
                </div>
                ${p.img ? `<div class="post-img-container"><img src="${p.img}" class="post-img" onclick="zoom('${p.img}')"></div>` : ''}
                <div class="post-actions">
                    <div class="reactions-group">
                        <span style="cursor:pointer" onclick="react(${p.id})">❤️</span>
                        <span><b>${p.likes}</b></span>
                    </div>
                    ${p.img ? `<a href="${p.img}" download="memory.png" style="text-decoration:none; color:var(--primary); font-size:14px">⬇️ تحميل</a>` : ''}
                </div>
                <div class="post-info"><span>${p.text}</span></div>
            </div>
        `).reverse().join('');
    }

    function react(id) { let p = posts.find(x => x.id === id); p.likes++; renderPosts(); }
    function delPost(id) { if(confirm("حذف الذكرى؟")) { posts = posts.filter(x => x.id !== id); renderPosts(); } }

    function sendMsg() {
        let val = document.getElementById("chatInput").value;
        if(!val) return;
        messages.push({user, text: val});
        document.getElementById("chatInput").value = "";
        renderChat();
    }

    function renderChat() {
        let div = document.getElementById("chatMsgs");
        div.innerHTML = messages.map(m => `
            <div class="msg ${m.user === user ? 'msg-me' : 'msg-other'}">
                <small>${m.user}</small><br>${m.text}
            </div>
        `).join('');
        div.scrollTop = div.scrollHeight;
    }

    function zoom(src) { document.getElementById("imgModal").style.display='flex'; document.getElementById("modalImg").src=src; }
    function copyLink() { navigator.clipboard.writeText(window.location.href + " Code: " + code); alert("تم النسخ!"); }
</script>

</body>
</html>
