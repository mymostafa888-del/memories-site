<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Elite | Mostafa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">
    <h3 style="margin-top:40px">الإعدادات المميزة</h3>
    <button onclick="showPage('memPage')">📸 الذكريات</button>
    <button onclick="showPage('chatPage')">💬 الشات</button>
    <button onclick="showPage('hallPage')">🏆 لوحة الشرف</button>
    <hr>
    <div class="setting-item">
        <span>الوضع الليلي</span>
        <input type="checkbox" onchange="toggleDark()" style="width:30px">
    </div>
    <button onclick="copyLink()" style="background:#4267B2">🔗 نسخ كود الغرفة</button>
    <button onclick="location.reload()" style="background:#555">خروج</button>
</div>

<div class="container" id="home">
    <h1 style="text-align:center; color: #ff4081;">Memories Elite</h1>
    <button onclick="showPage('create')">إنشاء غرفة جديدة</button>
    <button onclick="showPage('join')">انضمام لصديق</button>
</div>

<div class="container" id="create" style="display:none">
    <h3>إنشاء غرفة</h3>
    <input id="roomNameInput" placeholder="اسم الغرفة">
    <input id="userName1" placeholder="اسمك">
    <p>الكود: <b id="generatedCode" style="color:#ff4081"></b></p>
    <button onclick="initRoom(true)">ابدأ الرحلة</button>
</div>

<div class="container" id="join" style="display:none">
    <h3>انضمام</h3>
    <input id="userName2" placeholder="اسمك">
    <input id="roomCodeInput" placeholder="كود الغرفة">
    <button onclick="initRoom(false)">دخول</button>
</div>

<div id="mainContent" style="display:none">
    <div class="room-header">
        <h2 id="displayRoomName"></h2>
        <span id="displayRoomCode"></span>
    </div>

    <div class="container" id="memPage">
        <div class="add-box">
            <input id="memText" placeholder="إضافة ذكرى لليوم...">
            <label for="memFile" class="custom-file-upload" id="fileLabel">📸 اختر صورة</label>
            <input type="file" id="memFile" accept="image/*" style="display:none" onchange="updateLabel()">
            <button onclick="uploadMemory()">نشر الآن</button>
        </div>
        <div id="postsList"></div>
    </div>

    <div class="container" id="chatPage" style="display:none">
        <div class="chat-container">
            <div class="chat-messages" id="chatMsgs"></div>
            <div id="typingArea"></div>
            <div class="chat-input-area">
                <input id="chatInput" placeholder="رسالتك..." oninput="showTyping()">
                <button onclick="sendMsg()" style="width:70px">إرسال</button>
            </div>
        </div>
    </div>

    <div class="container" id="hallPage" style="display:none">
        <div class="hall-box" id="hallBox">
            <h3>🏆 الذكرى الأسطورية</h3>
            <div id="bestMemoryContent"></div>
        </div>
        <p style="text-align:center; opacity: 0.7;">هنا تظهر الصور الحاصلة على أعلى تفاعل في الغرفة</p>
    </div>
</div>

<div class="modal" id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script src="app.js"></script>
</body>
</html>
